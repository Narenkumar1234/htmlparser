<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sandbox Preview</title>
  <style>
    html,
    body {
      margin: 0;
      height: 100%;
      background: #ffffff;
    }

    #runtimeFrame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #ffffff;
    }
  </style>
</head>
<body>
  <iframe
    id="runtimeFrame"
    title="Rendered HTML output"
    sandbox="allow-scripts allow-forms allow-modals allow-downloads"
  ></iframe>
  <script src="sandbox.js"></script>
</body>
</html>
